spring:
  application:
    name: gestionUser
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    config:
      enabled: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri = ce que Keycloak met dans le token (vu du browser/client)
         # issuer-uri: http://localhost:9090/realms/vermeg-realm
          #  jwk-set-uri = pour télécharger les clés depuis l'intérieur Docker
          jwk-set-uri: http://keycloak:8080/realms/vermeg-realm/protocol/openid-connect/certs

server:
  port: 9092

web:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework: INFO

---
spring:
  config:
    activate:
      on-profile: docker

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/vermeg-realm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka
