<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Vermeg — Plateforme d'Assurance</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Plateforme de gestion d'assurance Vermeg — Gérez vos produits, packs et garanties en toute simplicité.">
  <meta name="theme-color" content="#4F46E5">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts: Inter + Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <script>
    (() => {
      const stored = localStorage.getItem('theme');
      const preferred =
        stored ||
        (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      let themeLink = document.getElementById('primeng-theme');
      if (!themeLink) {
        themeLink = document.createElement('link');
        themeLink.id = 'primeng-theme';
        themeLink.rel = 'stylesheet';
        document.head.appendChild(themeLink);
      }

      document.documentElement.dataset.theme = preferred;
      document.documentElement.setAttribute('data-bs-theme', preferred);
      document.documentElement.style.setProperty('--bs-primary', preferred === 'dark' ? '#818CF8' : '#4F46E5');
      document.documentElement.style.setProperty('--bs-primary-rgb', preferred === 'dark' ? '129, 140, 248' : '79, 70, 229');

      if (themeLink) {
        themeLink.setAttribute(
          'href',
          preferred === 'dark'
            ? './assets/primeng-themes/lara-dark-blue/theme.css'
            : './assets/primeng-themes/lara-light-blue/theme.css'
        );
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
