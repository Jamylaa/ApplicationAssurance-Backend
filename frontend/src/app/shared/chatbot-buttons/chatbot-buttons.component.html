<div class="chatbot-buttons-container">
  <div class="chatbot-buttons-header">
    <h3 class="chatbot-buttons-title">
      <i class="bi bi-chat-dots"></i>
      Assistants Virtuels
    </h3>
    <p class="chatbot-buttons-subtitle">Choisissez l'assistant adapté à vos besoins</p>
  </div>
  
  <div class="chatbot-buttons-grid">
    <div 
      *ngFor="let chatbot of chatbots" 
      class="chatbot-button-card"
      (click)="openChatbot(chatbot)"
      [style.--chatbot-color]="chatbot.color">
      
      <div class="chatbot-button-icon">
        <i class="bi" [ngClass]="chatbot.icon"></i>
      </div>
      
      <div class="chatbot-button-content">
        <h4 class="chatbot-button-name">{{ chatbot.name }}</h4>
        <p class="chatbot-button-description">{{ chatbot.description }}</p>
      </div>
      
      <div class="chatbot-button-arrow">
        <i class="bi bi-arrow-right"></i>
      </div>
    </div>
  </div>
  
  <div class="chatbot-buttons-footer">
    <button class="quick-access-btn" (click)="navigateToChatbot('')">
      <i class="bi bi-chat-square-text"></i>
      Accès rapide au chat
    </button>
  </div>
</div>
