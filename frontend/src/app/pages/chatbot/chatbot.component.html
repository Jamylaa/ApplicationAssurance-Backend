<div class="chatbot-container">
  <!-- Header -->
  <div class="chatbot-header">
    <div class="header-left">
      <button class="back-btn" (click)="goBack()" title="Retour au dashboard">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div class="chatbot-info">
        <h2 class="chatbot-title">{{ chatbotTitle }}</h2>
        <p class="chatbot-description">{{ chatbotDescription }}</p>
      </div>
    </div>
    <div class="header-right">
      <button class="clear-btn" (click)="clearChat()" title="Effacer la conversation">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </div>

  <!-- Messages Container -->
  <div class="chat-messages">
    <div *ngFor="let message of messages" class="message" [class.user-message]="message.sender === 'user'" [class.bot-message]="message.sender === 'bot'">
      <div class="message-avatar">
        <i class="bi" [ngClass]="message.sender === 'user' ? 'bi-person-circle' : 'bi-robot'"></i>
      </div>
      <div class="message-content">
        <div class="message-text" [innerHTML]="formatMessage(message.text)"></div>
        <div class="message-time">{{ formatTime(message.timestamp) }}</div>
      </div>
    </div>
    
    <!-- Loading Indicator -->
    <div *ngIf="isLoading" class="message bot-message">
      <div class="message-avatar">
        <i class="bi bi-robot"></i>
      </div>
      <div class="message-content">
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-container">
    <div class="input-wrapper">
      <textarea 
        [(ngModel)]="currentMessage" 
        (keypress)="onKeyPress($event)"
        placeholder="Tapez votre message ici..."
        rows="1"
        class="chat-input"
        [disabled]="isLoading">
      </textarea>
      <button 
        class="send-btn" 
        (click)="sendMessage()"
        [disabled]="!currentMessage.trim() || isLoading"
        title="Envoyer">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>
</div>
