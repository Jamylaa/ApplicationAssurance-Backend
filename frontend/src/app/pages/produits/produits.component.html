<div class="produits-container">
  <p-toast></p-toast>
  
  <p-card header="Gestion des Produits" class="produits-card">
    <div class="card-header">
      <div class="header-actions">
        <p-button 
          label="Actualiser" 
          icon="pi pi-refresh" 
          (click)="refreshProduits()"
          [loading]="loading">
        </p-button>
        <p-button 
          label="Ajouter un produit" 
          icon="pi pi-plus" 
          class="p-button-outlined">
        </p-button>
      </div>
    </div>

    <div class="search-section">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input 
          type="text" 
          pInputText 
          placeholder="Rechercher..." 
          (input)="onGlobalFilter($event)"
          [value]="globalFilterValue">
      </span>
    </div>

    <p-table 
      [value]="produits" 
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Affichage de {first} à {last} sur {totalRecords} produits"
      emptyMessage="'Aucun produit trouvé'"
      responsiveLayout="scroll"
      styleClass="p-datatable-striped p-datatable-hoverable-rows">
      
      <ng-template pTemplate="caption">
        <div class="table-caption">
          <h5>Liste des produits ({{ produits.length }})</h5>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="nom">Nom <p-sortIcon field="nom"></p-sortIcon></th>
          <th pSortableColumn="description">Description <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="prix">Prix <p-sortIcon field="prix"></p-sortIcon></th>
          <th pSortableColumn="type">Type <p-sortIcon field="type"></p-sortIcon></th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-produit>
        <tr>
          <td>{{ produit.nom }}</td>
          <td>{{ produit.description || 'Non spécifiée' }}</td>
          <td>{{ produit.prix ? produit.prix + ' €' : 'Non spécifié' }}</td>
          <td><p-badge [value]="produit.type || 'Non spécifié'"></p-badge></td>
          <td>
            <div class="action-buttons">
              <p-button icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-info"></p-button>
              <p-button icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
