<div class="recommendations-container">
  <p-toast></p-toast>
  
  <p-card header="Gestion des Recommandations" class="recommendations-card">
    <div class="card-header">
      <div class="header-actions">
        <p-button 
          label="Actualiser" 
          icon="pi pi-refresh" 
          (click)="loadRecommendations()"
          [loading]="loading">
        </p-button>
        <p-button 
          label="Générer des recommandations" 
          icon="pi pi-plus" 
          class="p-button-outlined">
        </p-button>
      </div>
    </div>

    <p-table 
      [value]="recommendations" 
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      emptyMessage="'Aucune recommandation trouvée'"
      responsiveLayout="scroll">
      
      <ng-template pTemplate="caption">
        <div class="table-caption">
          <h5>Liste des recommandations ({{ recommendations.length }})</h5>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th>ID Utilisateur</th>
          <th>ID Produit</th>
          <th>Type</th>
          <th>Score</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-recommendation>
        <tr>
          <td>{{ recommendation.idUser }}</td>
          <td>{{ recommendation.idProduit }}</td>
          <td>{{ recommendation.type }}</td>
          <td>{{ recommendation.score || 'N/A' }}</td>
          <td>{{ recommendation.dateGeneration | date:'dd/MM/yyyy' }}</td>
          <td>
            <div class="action-buttons">
              <p-button icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-info"></p-button>
              <p-button icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
