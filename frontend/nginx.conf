events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compression Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;
    gzip_disable "msie6";

    server {
        listen 80;
        server_name localhost;

        # root pointe vers /usr/share/nginx/html (aligné avec le Dockerfile)
        root /usr/share/nginx/html;
        index index.html index.htm;

        # pas de cache (toujours forcer le refresh)
        location ~* \.html?$ {
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
            add_header ETag "" always;
            add_header Pragma "no-cache" always;
            try_files $uri $uri/ /index.html;
        }

        # ✅ Pour les fichiers avec hash (JS, CSS, images): longue durée de cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 365d;
        }

        # ✅ Route par défaut pour SPA Angular
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ✅ Logs d'accès pour diagnostiquer
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
    }
}
