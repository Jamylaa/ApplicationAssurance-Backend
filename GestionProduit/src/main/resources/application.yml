spring:
  application:
    name: gestionProduit

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    config:
      enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/vermeg-realm

server:
  port: 9093

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  url: https://generativelanguage.googleapis.com/v1beta/models
  timeout-seconds: 30
  max-retries: 3
  retry-delay-ms: 1000
  enabled: ${GEMINI_ENABLED:true}

chatbot:
  ai-extraction-enabled: true
  fallback-on-ai-error: true
  strict-action-detection: true
  log-prompts: true

web:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    com.zaxxer.hikari: INFO
    org.springframework.web: INFO
    org.springframework.web.servlet.mvc.method.annotation: INFO

---
spring:
  config:
    activate:
      on-profile: docker

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password@mongodb:27017/vermeg_db?authSource=admin}
      database: ${MONGODB_DATABASE:vermeg_db}

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka

---
spring:
  config:
    activate:
      on-profile: local

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password@localhost:27017/vermeg_db?authSource=admin}
      database: ${MONGODB_DATABASE:vermeg_db}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka