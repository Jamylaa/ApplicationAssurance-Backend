spring.application.name=GestionSouscription
server.port=9094

# MongoDB
#spring.data.mongodb.host=localhost
#spring.data.mongodb.port=27017
#spring.data.mongodb.database=souscription_db

# Eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# CORS configuration for Angular
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,DELETE,PUT,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.max-age=3600
spring.web.cors.allow-credentials=true

# Disable Spring Cloud Config
spring.cloud.config.enabled=false

# Logging
logging.level.org.springframework=INFO
logging.level.tn.vermeg.gestionsouscription=DEBUG