spring:
  application:
    name: Recommendation
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    config:
      enabled: false

server:
  port: 9095

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka}
  instance:
    prefer-ip-address: true

web:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: GET,POST,DELETE,PUT
    allowed-headers: "*"
    max-age: 3600
    allow-credentials: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password@mongodb:27017/recommendation_db?authSource=admin}
      database: ${MONGODB_DATABASE:vermeg_db}

---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password@localhost:27017/recommendation_db?authSource=admin}
      database: ${MONGODB_DATABASE:vermeg_db}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
