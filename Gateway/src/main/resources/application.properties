spring.application.name=gateway
server.port=9091

# Force reactive web application type (fix Spring MVC conflict)
spring.main.web-application-type=reactive

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Routes vers les microservices (sans préfixe /api car les services l'ont déjŕ)
# User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://GestionUser
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/admins/**,/clients/**,/clients-v2/**

# Product Service
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://GestionProduit
spring.cloud.gateway.routes[1].predicates[0]=Path=/produits/**,/packs/**,/garanties/**

# Subscription Service
spring.cloud.gateway.routes[2].id=subscription-service
spring.cloud.gateway.routes[2].uri=lb://GestionSouscription
spring.cloud.gateway.routes[2].predicates[0]=Path=/contrats/**,/souscription/**

# Recommendation Service
spring.cloud.gateway.routes[3].id=recommendation-service
spring.cloud.gateway.routes[3].uri=lb://GestionRecommendation
spring.cloud.gateway.routes[3].predicates[0]=Path=/recommendations/**

# Routes avec /api pour compatibilité frontend
spring.cloud.gateway.routes[4].id=api-user-service
spring.cloud.gateway.routes[4].uri=lb://GestionUser
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**,/api/admins/**,/api/clients/**,/api/clients-v2/**

spring.cloud.gateway.routes[5].id=api-product-service
spring.cloud.gateway.routes[5].uri=lb://GestionProduit
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/produits/**,/api/packs/**,/api/garanties/**

spring.cloud.gateway.routes[6].id=api-subscription-service
spring.cloud.gateway.routes[6].uri=lb://GestionSouscription
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/contrats/**,/api/souscription/**

spring.cloud.gateway.routes[7].id=api-recommendation-service
spring.cloud.gateway.routes[7].uri=lb://GestionRecommendation
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/recommendations/**

# CORS global
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# JWT properties
jwt.secret=MY_SUPER_SECRET_KEY_SHARED_FOR_ALL_MICROSERVICES_2026_SECURE_512_BITS_KEY_EXTENDED
jwt.expiration=86400000 
