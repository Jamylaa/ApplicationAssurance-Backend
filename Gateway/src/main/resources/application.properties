spring.application.name=gateway
server.port=9091

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Routes vers les microservices
# User Service
spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=lb://GestionUser
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**,/api/admins/**,/api/clients/**,/api/clients-v2/**

# Product Service
spring.cloud.gateway.mvc.routes[1].id=product-service
spring.cloud.gateway.mvc.routes[1].uri=lb://GestionProduit
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/produits/**,/api/packs/**,/api/garanties/**

# Subscription Service
spring.cloud.gateway.mvc.routes[2].id=subscription-service
spring.cloud.gateway.mvc.routes[2].uri=lb://GestionSouscription
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/contrats/**,/api/souscription/**

# Recommendation Service
spring.cloud.gateway.mvc.routes[3].id=recommendation-service
spring.cloud.gateway.mvc.routes[3].uri=lb://GestionRecommendation
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/recommendations/**

# CORS global
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true