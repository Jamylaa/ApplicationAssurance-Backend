spring.application.name=gateway
server.port=9091

# Force reactive web application type (fix Spring MVC conflict)
spring.main.web-application-type=reactive

# Eureka
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.prefer-ip-address=true

# JWT properties
jwt.secret=MY_SUPER_SECRET_KEY_SHARED_FOR_ALL_MICROSERVICES_2026_SECURE_512_BITS_KEY_EXTENDED
jwt.expiration=86400000 

# Routes
spring.cloud.gateway.routes[0].id=api-user-service
spring.cloud.gateway.routes[0].uri=lb://GestionUser
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

spring.cloud.gateway.routes[1].id=api-product-service
spring.cloud.gateway.routes[1].uri=lb://GestionProduit
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/produits/**,/api/packs/**,/api/garanties/**

spring.cloud.gateway.routes[2].id=api-recommendation-service
spring.cloud.gateway.routes[2].uri=lb://GestionRecommendation
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/recommendations/**

spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://GestionUser
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**,/users/**

# CORS global
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://frontend:80
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
